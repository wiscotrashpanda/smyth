name: Build

on:
  push:
    branches:
      - main
      - feat/**
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  build-binaries:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 go build -o "dist/smyth-${GOOS}-${GOARCH}" ./cmd/smyth

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: smyth-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/smyth-${{ matrix.goos }}-${{ matrix.goarch }}
