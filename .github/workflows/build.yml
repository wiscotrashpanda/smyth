name: Build

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build Linux binaries
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/smyth-linux-amd64 ./cmd/smyth
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o dist/smyth-linux-arm64 ./cmd/smyth

      - name: Upload amd64 binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: smyth-linux-amd64
          path: dist/smyth-linux-amd64

      - name: Upload arm64 binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: smyth-linux-arm64
          path: dist/smyth-linux-arm64
