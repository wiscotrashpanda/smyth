name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-release-assets:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          archive_name="smyth-${GOOS}-${GOARCH}.tar.gz"
          mkdir -p "dist/${GOOS}-${GOARCH}"
          CGO_ENABLED=0 go build -o "dist/${GOOS}-${GOARCH}/smyth" ./cmd/smyth
          tar -czf "dist/${archive_name}" -C "dist/${GOOS}-${GOARCH}" smyth

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/smyth-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  publish-release:
    runs-on: ubuntu-latest
    needs: build-release-assets

    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 *.tar.gz > SHA256SUMS.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
